<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task - Train Booker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 40px; }
        h1 { text-align: center; color: #1f2937; margin-bottom: 10px; font-size: 28px; }
        h2 { color: #374151; margin: 30px 0 20px 0; font-size: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .col { flex: 1; min-width: 250px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #374151; }
        input, select { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; transition: border-color 0.2s, box-shadow 0.2s; }
        input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        button { background: #3b82f6; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin: 10px 5px 0 0; }
        button:hover { background: #2563eb; }
        .add-btn { background: #10b981; }
        .add-btn:hover { background: #059669; }
        .remove-btn { background: #ef4444; }
        .remove-btn:hover { background: #dc2626; }
        .passenger { border: 2px solid #e5e7eb; border-radius: 10px; padding: 20px; margin-bottom: 15px; background: #fafbfc; }
        #submit { width: 100%; padding: 18px; font-size: 18px; margin-top: 30px; }
        .autocomplete-dropdown { 
            position: absolute; 
            top: 100%; 
            left: 0; 
            right: 0; 
            background: white; 
            border: 1px solid #d1d5db; 
            border-radius: 0 0 8px 8px; 
            max-height: 220px; 
            overflow-y: auto; 
            z-index: 10000 !important; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            max-width: 100%; 
        }
        .autocomplete-option { 
            padding: 14px 16px; 
            cursor: pointer; 
            border-bottom: 1px solid #f9fafb; 
            font-size: 15px; 
            transition: background 0.2s; 
        }
        .autocomplete-option:hover, .autocomplete-option.active { 
            background: #eff6ff; 
            color: #1e40af; 
        }
        .autocomplete-container { position: relative; }
        .back-link { display: inline-block; margin-top: 20px; color: #6b7280; text-decoration: none; font-weight: 500; }
        .back-link:hover { color: #374151; }
        .payment-group { display: none; margin-top: 12px; padding: 15px; background: #f8fafc; border-radius: 8px; border-left: 4px solid #3b82f6; }
        .error { border-color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚂 Tatkal Auto Booker - Add Task</h1>
        <p style="text-align: center; color: #6b7280; margin-bottom: 30px; font-size: 16px;">Fill details - <strong>type 2+ chars in train/station for instant dropdown list</strong></p>

        <form method="post">
            {% csrf_token %}

            <h2>Train Journey</h2>
            <div class="row">
                <div class="col">
                    <label>Train (type '122' → see 12221 Duronto etc)</label>
                    <div class="autocomplete-container">
                        <input type="text" name="train_name_number" placeholder="12221 - Pune Howrah Duronto..." autocomplete="off" required>
                    </div>
                </div>
                <div class="col">
                    <label>From Station (type 'Mum')</label>
                    <div class="autocomplete-container">
                        <input type="text" name="source_station" placeholder="Mumbai CST" autocomplete="off" required>
                    </div>
                </div>
                <div class="col">
                    <label>To Station (type 'Del')</label>
                    <div class="autocomplete-container">
                        <input type="text" name="destination_station" placeholder="New Delhi" autocomplete="off" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Journey Date</label>
                    <input type="date" name="journey_date" required>
                </div>
                <div class="col">
                    <label>Class</label>
                    <select name="class_type" required>
                        <option value="">Select class</option>
                        <option value="SL">SL - Sleeper</option>
                        <option value="3A">3A - AC 3 Tier</option>
                        <option value="2A">2A - AC 2 Tier</option>
                        <option value="1A">1A - AC 1 Tier</option>
                    </select>
                </div>
                <div class="col">
                    <label>Tatkal Time (optional)</label>
                    <input type="datetime-local" name="booking_time" step="60">
                </div>
            </div>

            <h2>Passengers</h2>
            <div id="passenger-section">
                <div class="passenger">
                    <div class="row">
                        <div class="col">
                            <label>Name</label>
                            <input type="text" name="passengers-0-name" placeholder="John Doe" required>
                        </div>
                        <div class="col">
                            <label>Age</label>
                            <input type="number" name="passengers-0-age" min="1" max="99" value="30" required>
                        </div>
                        <div class="col">
                            <label>Gender</label>
                            <select name="passengers-0-gender" required>
                                <option value="">Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <button type="button" class="btn add-btn" onclick="addPassenger()">➕ Add Passenger</button>

            <h2>Payment Info</h2>
            <div class="row">
                <div class="col">
                    <label>Method</label>
                    <select name="payment_method" onchange="showPaymentDetails(this.value)" required>
                        <option value="UPI">UPI</option>
                        <option value="CREDIT_CARD">Credit Card</option>
                        <option value="DEBIT_CARD">Debit Card</option>
                        <option value="NET_BANKING">Net Banking</option>
                    </select>
                </div>
                <div class="col">
                    <label>Amount (₹)</label>
                    <input type="number" name="amount" value="1850" min="100" step="5" required>
                </div>
            </div>
            <div id="payment-extra"></div>

            <button type="submit" id="submit" class="btn btn-primary">🚀 Create Booking Task Now</button>
        </form>

        {% if messages %}
        <ul class=\"messages\">
            {% for message in messages %}
            <li{% if message.tags %} class=\"{{ message.tags }}\"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
    </div>

    <style>
        .messages {
            list-style: none;
            margin: 20px 0;
        }
        .messages li {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .messages .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .messages .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>

    <script>
        let passengerNum = 1;

        function addPassenger() {
            passengerNum++;
            const section = document.getElementById('passenger-section');
            const passDiv = document.createElement('div');
            passDiv.className = 'passenger';
            passDiv.innerHTML = `
                <div class="row">
                    <div class="col">
                        <label>Name</label>
                        <input type="text" name="passengers-${passengerNum-1}-name" placeholder="Jane Doe" required>
                    </div>
                    <div class="col">
                        <label>Age</label>
                        <input type="number" name="passengers-${passengerNum-1}-age" min="1" max="99" required>
                    </div>
                    <div class="col">
                        <label>Gender</label>
                        <select name="passengers-${passengerNum-1}-gender" required>
                            <option value="">Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()" style="float:right;margin-top:10px;">Remove</button>
            `;
            section.appendChild(passDiv);
        }

        function showPaymentDetails(method) {
            const extra = document.getElementById('payment-extra');
            extra.innerHTML = '';
            if (method === 'UPI') {
                extra.innerHTML = '<div class="row"><div class="col"><label>UPI ID</label><input type="text" name="upi_id" placeholder="user@ybl"></div></div>';
            } else if (method === 'CREDIT_CARD' || method === 'DEBIT_CARD') {
                extra.innerHTML = `
                    <div class="row">
                        <div class="col">
                            <label>Card Number</label>
                            <input type="text" name="card_number" maxlength="19" placeholder="**** **** **** ****">
                        </div>
                        <div class="col">
                            <label>Expiry (MM/YY)</label>
                            <input type="text" name="card_expiry" maxlength="5" placeholder="12/25">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label>CVV</label>
                            <input type="text" name="card_cvv" maxlength="4" placeholder="***">
                        </div>
                        <div class="col">
                            <label>Holder Name</label>
                            <input type="text" name="card_holder_name">
                        </div>
                    </div>
                `;
            } else if (method === 'NET_BANKING') {
                extra.innerHTML = '<div class="row"><div class="col"><label>Bank</label><input type="text" name="bank_name" placeholder="HDFC/ICICI/SBI"></div></div>';
            }
        }

        // AUTOCOMPLETE - FIXED BULLETPROOF VERSION
        function initAutocomplete() {
            const inputs = document.querySelectorAll('.autocomplete-container input');
            inputs.forEach(input => {
                const isTrain = input.name === 'train_name_number';
                input.addEventListener('input', function(e) {
                    const query = this.value;
                    const rect = this.getBoundingClientRect();
                    let dropdown = this.parentNode.querySelector('.autocomplete-dropdown');
                    if (dropdown) dropdown.remove();

                    if (query.length < 2) return;

                    dropdown = document.createElement('div');
                    dropdown.className = 'autocomplete-dropdown';
                    dropdown.style.position = 'absolute';
                    dropdown.style.left = '0';
                    dropdown.style.width = this.offsetWidth + 'px';
                    dropdown.style.top = (rect.bottom - rect.top) + 'px';
                    this.parentNode.appendChild(dropdown);

                    const url = `/dashboard/autocomplete/${isTrain ? 'trains' : 'stations'}/?term=${encodeURIComponent(query)}`;
                    fetch(url)
                      .then(response => response.json())
                      .then(data => {
                        dropdown.innerHTML = '';
                        if (data && data.length > 0) {
                          data.slice(0,10).forEach(optionText => {
                            const option = document.createElement('div');
                            option.className = 'autocomplete-option';
                            option.textContent = optionText;
                            option.onclick = () => {
                              input.value = optionText;
                              dropdown.remove();
                            };
                            dropdown.appendChild(option);
                          });
                        } else {
                          const noResult = document.createElement('div');
                          noResult.className = 'autocomplete-option';
                          noResult.textContent = 'No trains/stations found';
                          dropdown.appendChild(noResult);
                        }
                      })
                      .catch(() => {
                        const errorOption = document.createElement('div');
                        errorOption.className = 'autocomplete-option';
                        errorOption.textContent = 'Search error - check connection';
                        dropdown.appendChild(errorOption);
                      });
                });
            });
        }

        document.addEventListener('DOMContentLoaded', initAutocomplete);
        showPaymentDetails('UPI');
    </script>
</body>
</html>
