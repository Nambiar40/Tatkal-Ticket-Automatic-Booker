<!DOCTYPE html>
<html>
<head>
    <title>Login - Tatkal Auto Booker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Full page background with slideshow */
        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slideshow-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slideshow-image.active {
            opacity: 1;
        }

        .slideshow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Login form */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-form-overlay {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-form-overlay h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: #0056b3;
        }

        .text-center {
            text-align: center;
        }

        .text-secondary {
            color: #666;
        }

        .mt-2 {
            margin-top: 15px;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <!-- Slideshow Container -->
    <div class="slideshow-container">
        <img class="slideshow-image active" src="https://images.unsplash.com/photo-1637995735729-c43250f1ef47?fm=jpg&q=60&w=3000" alt="Indian Railways Train">
        <img class="slideshow-image" src="https://www.mypunepulse.com/wp-content/uploads/2025/03/Maharashtra-Approves-Konkan-Railway-Merger-with-Indian-Railways.jpeg" alt="Luxury Indian Train">
        <img class="slideshow-image" src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Vande_Bharat_Express_around_Mumbai.jpg" alt="Indian Express Train">
        <div class="slideshow-overlay"></div>
    </div>

    <!-- Login Form -->
    <div class="login-form-overlay">
        <h2>Welcome Back</h2>
        <p class="text-center text-secondary">Sign in to manage your booking tasks</p>
        
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" 
                           name="{{ field.name }}" 
                           id="{{ field.id_for_label }}"
                           placeholder="Enter your {{ field.label|lower }}"
                           {% if field.value %}value="{{ field.value }}"{% endif %}
                           required>
                    {% if field.errors %}
                        <div style="color: red; font-size: 12px;">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit">Sign In</button>
        </form>

        <div class="text-center mt-2">
            <p class="text-secondary">
                Don't have an account? 
                <a href="{% url 'signup' %}">Create one here</a>
            </p>
        </div>

        {% if form.errors %}
            <div class="error-message">
                <strong>Login failed:</strong> Please check your username and password.
            </div>
        {% endif %}
    </div>

    <script>
        // Simple slideshow JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            const slides = document.querySelectorAll('.slideshow-image');
            let currentIndex = 0;

            function showSlide(index) {
                slides.forEach((slide, i) => {
                    slide.classList.toggle('active', i === index);
                });
            }

            function nextSlide() {
                currentIndex = (currentIndex + 1) % slides.length;
                showSlide(currentIndex);
            }

            // Change slide every 5 seconds
            setInterval(nextSlide, 5000);
        });
    </script>
</body>
</html>
